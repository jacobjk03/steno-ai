name = "steno-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[vars]
ENVIRONMENT = "development"

[[queues.producers]]
queue = "steno-extraction"
binding = "EXTRACTION_QUEUE"

[[queues.producers]]
queue = "steno-webhooks"
binding = "WEBHOOK_QUEUE"

[[queues.consumers]]
queue = "steno-extraction"
max_batch_size = 10
max_retries = 3

[[queues.consumers]]
queue = "steno-webhooks"
max_batch_size = 10
max_retries = 3
