<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steno Memory Graph</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #06060e; color: #e0e0e8; font-family: 'Inter', sans-serif; overflow: hidden; }

  /* Loading */
  #loading { position: fixed; inset: 0; background: #06060e; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
  #loading.hidden { opacity: 0; pointer-events: none; transition: opacity 0.6s; }
  .loader { width: 32px; height: 32px; border: 2px solid #16162a; border-top-color: #818cf8; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { margin-top: 14px; color: #555; font-size: 13px; letter-spacing: 0.3px; }

  /* No-key message */
  .nokey { text-align: center; max-width: 380px; }
  .nokey h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; background: linear-gradient(135deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .nokey p { color: #555; font-size: 13px; margin-bottom: 16px; }
  .nokey code { background: #111122; padding: 8px 14px; border-radius: 8px; font-size: 11px; color: #818cf8; display: block; word-break: break-all; border: 1px solid #1a1a30; }

  /* Stats */
  #stats { position: fixed; top: 20px; right: 20px; background: rgba(10,10,20,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 16px 20px; font-size: 12px; z-index: 100; min-width: 170px; display: none; box-shadow: 0 4px 30px rgba(0,0,0,0.4); }
  .panel-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.2px; color: #818cf8; margin-bottom: 10px; }
  .stat { display: flex; justify-content: space-between; padding: 3px 0; }
  .stat span { color: #555; font-size: 12px; }
  .stat strong { color: #e0e0e8; font-weight: 600; font-variant-numeric: tabular-nums; font-size: 13px; }
  .stat-sep { margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.05); }

  /* Filters */
  #filters { position: fixed; top: 20px; left: 20px; background: rgba(10,10,20,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 16px 20px; font-size: 12px; z-index: 100; width: 210px; display: none; box-shadow: 0 4px 30px rgba(0,0,0,0.4); }
  #search { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 8px 12px; color: #e0e0e8; font-size: 12px; font-family: 'Inter', sans-serif; outline: none; margin-bottom: 14px; transition: border 0.2s; }
  #search:focus { border-color: #818cf8; }
  #search::placeholder { color: #444; }
  .section-label { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; color: #444; margin-bottom: 8px; }
  .fitem { display: flex; align-items: center; gap: 8px; padding: 3px 0; cursor: pointer; font-size: 12px; color: #999; transition: color 0.15s; }
  .fitem:hover { color: #e0e0e8; }
  .fitem input { accent-color: #818cf8; width: 14px; height: 14px; }
  .fdot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 6px currentColor; }
  .fcount { margin-left: auto; color: #333; font-size: 11px; font-variant-numeric: tabular-nums; }

  /* Fact panel */
  #fpanel { position: fixed; top: 0; right: -420px; width: 400px; height: 100vh; background: rgba(8,8,16,0.95); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border-left: 1px solid rgba(255,255,255,0.06); padding: 24px; z-index: 200; transition: right 0.35s cubic-bezier(0.16,1,0.3,1); overflow-y: auto; }
  #fpanel.open { right: 0; }
  .fp-close { position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,0.05); border: none; color: #666; font-size: 16px; cursor: pointer; width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .fp-close:hover { background: rgba(255,255,255,0.1); color: #e0e0e8; }
  .fp-name { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .fp-type { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 20px; display: flex; align-items: center; gap: 6px; }
  .fp-type-dot { width: 8px; height: 8px; border-radius: 50%; }
  .fp-section { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; color: #444; margin: 20px 0 10px; }
  .fact { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; font-size: 13px; line-height: 1.6; color: #bbb; }
  .fact-imp { font-size: 10px; color: #818cf8; margin-top: 6px; font-weight: 500; }
  .edge-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 10px; padding: 10px 14px; margin-bottom: 6px; font-size: 12px; color: #999; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .edge-card strong { color: #818cf8; font-weight: 600; }

  /* Legend */
  #legend { position: fixed; bottom: 20px; left: 20px; background: rgba(10,10,20,0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 14px 18px; font-size: 11px; z-index: 100; display: none; box-shadow: 0 4px 30px rgba(0,0,0,0.4); }
  .legend-row { display: flex; align-items: center; gap: 8px; padding: 2px 0; }
  .legend-line { width: 24px; height: 3px; border-radius: 2px; }
  .legend-label { color: #555; font-size: 11px; }

  /* Tooltip */
  #tip { position: fixed; background: rgba(12,12,24,0.95); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 10px 14px; pointer-events: none; z-index: 300; display: none; box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
  .tip-name { font-weight: 600; font-size: 13px; color: #e0e0e8; }
  .tip-type { color: #555; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .tip-facts { color: #818cf8; font-size: 11px; margin-top: 3px; font-weight: 500; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
</style>
</head>
<body>

<div id="loading"><div class="loader"></div><p>Loading memory graph...</p></div>

<div id="stats">
  <div class="panel-title">Memory Stats</div>
  <div class="stat"><span>Entities</span><strong id="s-ent">0</strong></div>
  <div class="stat"><span>Edges</span><strong id="s-edg">0</strong></div>
  <div class="stat"><span>Facts</span><strong id="s-fct">0</strong></div>
  <div class="stat stat-sep"><span>Visible</span><strong id="s-vis">0</strong></div>
</div>

<div id="filters">
  <div class="panel-title">Filters</div>
  <input type="text" id="search" placeholder="Search entities..." oninput="applyFilters()">
  <div class="section-label">Entity Types</div>
  <div id="type-filters"></div>
</div>

<div id="fpanel">
  <button class="fp-close" onclick="document.getElementById('fpanel').classList.remove('open')">&times;</button>
  <div class="fp-name" id="fp-name"></div>
  <div class="fp-type"><span class="fp-type-dot" id="fp-dot"></span><span id="fp-type"></span></div>
  <div class="fp-section">Facts</div>
  <div id="fp-facts"></div>
  <div class="fp-section">Relationships</div>
  <div id="fp-edges"></div>
</div>

<div id="tip"><div class="tip-name" id="tn"></div><div class="tip-type" id="tt"></div><div class="tip-facts" id="tf"></div></div>

<div id="legend">
  <div class="panel-title">Relationships</div>
  <div id="legend-items"></div>
</div>

<div id="graph"></div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/3d-force-graph@1.73.4/dist/3d-force-graph.min.js"></script>
<script>
const C = { person:'#6366f1', organization:'#22c55e', location:'#ef4444', technology:'#a855f7', concept:'#f59e0b', event:'#eab308' };
const EC = { associative:'#4f5d99', causal:'#c2506a', temporal:'#3a9a6a', hierarchical:'#9a9a3a', contradictory:'#ef4444' };
const DC = '#3a3a50';

const P = new URLSearchParams(location.search);
const URL = P.get('url') || 'https://zhqcetwuecedebrbawxl.supabase.co';
const KEY = P.get('key') || '';
const TID = P.get('tenant') || '00000000-0000-0000-0000-000000000001';

if (!KEY) {
  document.getElementById('loading').innerHTML = '<div class="nokey"><h2>Steno Memory Graph</h2><p>Add your Supabase key to the URL</p><code>localhost:3333?key=YOUR_KEY</code></div>';
} else init();

let graph, fullData = { nodes: [], links: [] };

async function GET(t, q) {
  const r = await fetch(`${URL}/rest/v1/${t}?${q}`, { headers: { apikey: KEY, Authorization: `Bearer ${KEY}` } });
  return r.json();
}

async function init() {
  try {
    const [ents, edgs, fes, factsRes] = await Promise.all([
      GET('entities', `tenant_id=eq.${TID}&merge_target_id=is.null&select=id,canonical_name,name,entity_type&limit=500`),
      GET('edges', `tenant_id=eq.${TID}&select=id,source_id,target_id,relation,edge_type,weight&limit=5000`),
      GET('fact_entities', `select=entity_id&limit=10000`),
      GET('facts', `tenant_id=eq.${TID}&valid_until=is.null&select=id&limit=1000`),
    ]);

    const eids = new Set(ents.map(e => e.id));
    const fc = {};
    fes.forEach(f => { if (eids.has(f.entity_id)) fc[f.entity_id] = (fc[f.entity_id]||0)+1; });

    const nodes = ents.map(e => ({
      id: e.id, name: e.canonical_name||e.name||'?',
      displayName: (e.name||e.canonical_name||'?').split(' ').map(w => w.charAt(0).toUpperCase()+w.slice(1)).join(' '),
      type: e.entity_type||'concept', factCount: fc[e.id]||0
    }));

    const nids = new Set(nodes.map(n => n.id));
    const links = edgs.filter(e => nids.has(e.source_id)&&nids.has(e.target_id)).map(e => ({
      source: e.source_id, target: e.target_id, relation: e.relation,
      edgeType: e.edge_type, weight: parseFloat(e.weight)||1
    }));

    fullData = { nodes, links };

    document.getElementById('s-ent').textContent = nodes.length;
    document.getElementById('s-edg').textContent = links.length;
    document.getElementById('s-vis').textContent = nodes.length;
    document.getElementById('stats').style.display = 'block';

    const types = [...new Set(nodes.map(n => n.type))].sort();
    document.getElementById('type-filters').innerHTML = types.map(t =>
      `<label class="fitem"><input type="checkbox" checked data-type="${t}" onchange="applyFilters()"><span class="fdot" style="background:${C[t]||DC};color:${C[t]||DC}"></span>${t}<span class="fcount">${nodes.filter(n=>n.type===t).length}</span></label>`
    ).join('');
    document.getElementById('filters').style.display = 'block';

    const et = [...new Set(links.map(l=>l.edgeType))].sort();
    document.getElementById('legend-items').innerHTML = et.map(t =>
      `<div class="legend-row"><div class="legend-line" style="background:${EC[t]||'#444'}"></div><span class="legend-label">${t}</span></div>`
    ).join('');
    document.getElementById('legend').style.display = 'block';

    render(nodes, links);
    setTimeout(() => document.getElementById('loading').classList.add('hidden'), 500);
  } catch(e) {
    document.getElementById('loading').querySelector('p').textContent = 'Error: ' + e.message;
  }
}

function render(nodes, links) {
  if (graph) document.getElementById('graph').innerHTML = '';

  graph = ForceGraph3D()(document.getElementById('graph'))
    .backgroundColor('#06060e')
    .graphData({ nodes: [...nodes], links: [...links] })
    .nodeVal(n => Math.max(1.5, Math.sqrt(n.factCount+1)*2))
    .nodeColor(n => C[n.type]||DC)
    .nodeOpacity(0.95)
    .nodeLabel('')
    .nodeThreeObject(node => {
      const g = new THREE.Group();
      const s = Math.max(2.5, Math.sqrt(node.factCount+1)*2);
      const c = C[node.type]||DC;

      // Glow
      const gg = new THREE.SphereGeometry(s*1.8, 12, 12);
      g.add(new THREE.Mesh(gg, new THREE.MeshBasicMaterial({ color:c, transparent:true, opacity:0.06 })));

      // Core
      const geo = new THREE.SphereGeometry(s, 24, 24);
      g.add(new THREE.Mesh(geo, new THREE.MeshPhongMaterial({
        color:c, emissive:c, emissiveIntensity:0.5, transparent:true, opacity:0.95, shininess:100
      })));

      // Label — only show for nodes with facts or important ones
      if (node.factCount > 0 || node.name === 'user') {
        const cv = document.createElement('canvas');
        const ctx = cv.getContext('2d');
        const txt = node.displayName;
        const fs = 40;
        const sc = 3;
        ctx.font = `600 ${fs}px Inter,sans-serif`;
        const tw = ctx.measureText(txt).width;
        cv.width = (tw+28)*sc; cv.height = (fs+14)*sc;
        ctx.scale(sc,sc);
        // Pill bg
        ctx.fillStyle = 'rgba(6,6,14,0.75)';
        const r = 6, w = tw+28, h = fs+14;
        ctx.beginPath();
        ctx.moveTo(r,0); ctx.lineTo(w-r,0); ctx.quadraticCurveTo(w,0,w,r);
        ctx.lineTo(w,h-r); ctx.quadraticCurveTo(w,h,w-r,h);
        ctx.lineTo(r,h); ctx.quadraticCurveTo(0,h,0,h-r);
        ctx.lineTo(0,r); ctx.quadraticCurveTo(0,0,r,0);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.06)';
        ctx.lineWidth = 1;
        ctx.stroke();
        // Text
        ctx.font = `600 ${fs}px Inter,sans-serif`;
        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(txt, w/2, h/2);

        const tex = new THREE.CanvasTexture(cv);
        const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map:tex, transparent:true, opacity:0.92 }));
        sp.scale.set(cv.width/12, cv.height/12, 1);
        sp.position.y = s + 4;
        g.add(sp);
      }

      return g;
    })
    .linkColor(l => EC[l.edgeType]||'#222233')
    .linkWidth(l => Math.max(0.4, l.weight*1))
    .linkOpacity(0.4)
    .linkCurvature(0.12)
    .linkDirectionalParticles(2)
    .linkDirectionalParticleWidth(1.5)
    .linkDirectionalParticleSpeed(0.005)
    .linkDirectionalParticleColor(l => EC[l.edgeType]||'#333')
    .linkLabel(l => `${l.relation}`)
    .onNodeHover(n => {
      const t = document.getElementById('tip');
      if (n) {
        document.getElementById('tn').textContent = n.displayName;
        document.getElementById('tt').textContent = n.type;
        document.getElementById('tf').textContent = n.factCount+' fact'+(n.factCount!==1?'s':'');
        t.style.display = 'block';
        document.body.style.cursor = 'pointer';
      } else { t.style.display = 'none'; document.body.style.cursor = 'default'; }
    })
    .onNodeClick(async n => {
      document.getElementById('fp-name').textContent = n.displayName;
      document.getElementById('fp-type').textContent = n.type;
      document.getElementById('fp-dot').style.background = C[n.type]||DC;
      const fd = document.getElementById('fp-facts');
      fd.innerHTML = '<div style="color:#444;font-size:12px">Loading...</div>';
      try {
        const fl = await GET('fact_entities', `entity_id=eq.${n.id}&select=facts(id,content,importance)&limit=20`);
        const facts = (fl||[]).map(f=>f.facts).filter(Boolean).sort((a,b)=>(b.importance||0)-(a.importance||0));
        fd.innerHTML = facts.length ? facts.map(f=>`<div class="fact">${f.content}<div class="fact-imp">${parseFloat(f.importance||0).toFixed(2)} importance</div></div>`).join('') : '<div style="color:#444;font-size:12px">No facts linked</div>';
      } catch(e) { fd.innerHTML = `<div style="color:#ef4444;font-size:12px">${e.message}</div>`; }
      const ed = document.getElementById('fp-edges');
      const ce = fullData.links.filter(l => { const s=typeof l.source==='object'?l.source.id:l.source; const t=typeof l.target==='object'?l.target.id:l.target; return s===n.id||t===n.id; });
      ed.innerHTML = ce.length ? ce.map(e => {
        const s=typeof e.source==='object'?e.source:fullData.nodes.find(x=>x.id===e.source);
        const t=typeof e.target==='object'?e.target:fullData.nodes.find(x=>x.id===e.target);
        return `<div class="edge-card">${s?.displayName||'?'} <strong>${e.relation}</strong> ${t?.displayName||'?'}</div>`;
      }).join('') : '<div style="color:#444;font-size:12px">No relationships</div>';
      document.getElementById('fpanel').classList.add('open');
    });

  graph.d3Force('charge').strength(-150);
  graph.d3Force('link').distance(50);
  const sc = graph.scene();
  sc.add(new THREE.AmbientLight(0x111122, 3));
  const dl = new THREE.DirectionalLight(0x8888cc, 0.8);
  dl.position.set(100,200,100);
  sc.add(dl);
  setTimeout(() => graph.zoomToFit(1200, 60), 2500);
}

document.addEventListener('mousemove', e => {
  const t = document.getElementById('tip');
  if (t.style.display === 'block') { t.style.left = (e.clientX+16)+'px'; t.style.top = (e.clientY+16)+'px'; }
});

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  const ct = new Set([...document.querySelectorAll('#type-filters input:checked')].map(c=>c.dataset.type));
  const fn = fullData.nodes.filter(n => ct.has(n.type) && (!q || n.name.includes(q) || n.displayName.toLowerCase().includes(q)));
  const fi = new Set(fn.map(n=>n.id));
  const fl = fullData.links.filter(l => { const s=typeof l.source==='object'?l.source.id:l.source; const t=typeof l.target==='object'?l.target.id:l.target; return fi.has(s)&&fi.has(t); });
  document.getElementById('s-vis').textContent = fn.length;
  graph.graphData({ nodes: fn, links: fl });
}
</script>
</body>
</html>
