[project]
name = "langchain-steno"
version = "0.1.0"
description = "Steno memory integration for LangChain and LangGraph"
requires-python = ">=3.9"
dependencies = ["steno-ai>=0.1.0", "langchain-core>=0.2"]

[project.optional-dependencies]
dev = ["pytest>=7"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
