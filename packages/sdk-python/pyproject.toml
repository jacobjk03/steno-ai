[project]
name = "steno-ai"
version = "0.1.0"
description = "The memory layer for AI — dead simple SDK"
requires-python = ">=3.9"
dependencies = ["httpx>=0.24"]
license = "MIT"
readme = "README.md"

[project.optional-dependencies]
dev = ["pytest>=7", "pytest-asyncio>=0.21", "respx>=0.21"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
